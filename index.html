<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Music Player</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #dbeafe 0%, #93c5fd 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const MusicCard = () => {
            const [isPlaying, setIsPlaying] = useState(false);

            return (
                <div className="relative w-80 overflow-hidden rounded-[2.5rem] border border-white/40 bg-white/30 p-8 shadow-2xl backdrop-blur-xl">
                    {/* Album Art */}
                    <div className="relative mb-8 aspect-square w-full overflow-hidden rounded-3xl shadow-lg border border-white/20">
                        <div className="flex h-full w-full items-center justify-center bg-gradient-to-br from-blue-400 to-blue-600">
                            <i className="lucide-music text-white/50 w-16 h-16"></i>
                        </div>
                    </div>

                    {/* Song Info */}
                    <div className="mb-8 text-center">
                        <h2 className="text-2xl font-bold text-blue-900 tracking-tight">Ethereal Blue</h2>
                        <p className="text-blue-800/60 font-medium">Glass Synthesis</p>
                    </div>

                    {/* Progress Bar */}
                    <div className="mb-8">
                        <div className="h-1.5 w-full rounded-full bg-blue-900/10">
                            <div className="h-1.5 w-2/3 rounded-full bg-blue-600 shadow-[0_0_12px_rgba(37,99,235,0.4)]"></div>
                        </div>
                        <div className="mt-2 flex justify-between text-xs font-bold text-blue-900/40">
                            <span>2:45</span>
                            <span>4:12</span>
                        </div>
                    </div>

                    {/* Controls */}
                    <div className="flex items-center justify-center gap-8">
                        <button className="text-blue-900/70 hover:text-blue-900 transition hover:scale-110">
                            <i className="lucide-skip-back fill-current w-6 h-6"></i>
                        </button>
                        
                        <button 
                            onClick={() => setIsPlaying(!isPlaying)}
                            className="flex h-16 w-16 items-center justify-center rounded-full bg-blue-600 text-white shadow-lg transition-all hover:bg-blue-700 hover:scale-105 active:scale-95"
                        >
                            {isPlaying ? 
                                <i className="lucide-pause fill-current w-6 h-6"></i> : 
                                <i className="lucide-play fill-current w-6 h-6 ml-1"></i>
                            }
                        </button>

                        <button className="text-blue-900/70 hover:text-blue-900 transition hover:scale-110">
                            <i className="lucide-skip-forward fill-current w-6 h-6"></i>
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MusicCard />);
    </script>
</body>
</html>
