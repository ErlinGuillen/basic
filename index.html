<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass UI Blog Feed</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed; /* Keeps gradient still while scrolling */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const blogPosts = [
            {
                id: 1,
                title: "The Art of Glassmorphism",
                date: "May 9, 2026",
                excerpt: "Explore how translucency and background blurs are defining the next decade of visual design."
            },
            {
                id: 2,
                title: "React Without Build Tools",
                date: "May 8, 2026",
                excerpt: "Sometimes simplicity wins. Learn how to use Babel CDN for rapid prototyping and small projects."
            },
            {
                id: 3,
                title: "Why Color Gradients Matter",
                date: "May 7, 2026",
                excerpt: "A deep dive into how vibrant backgrounds make glass UI elements truly pop."
            }
        ];

        const BlogCard = ({ post }) => {
            const [isHovered, setIsHovered] = React.useState(false);

            const cardStyle = {
                background: isHovered ? 'rgba(255, 255, 255, 0.25)' : 'rgba(255, 255, 255, 0.15)',
                borderRadius: '20px',
                padding: '30px',
                marginBottom: '30px',
                border: '1px solid rgba(255, 255, 255, 0.3)',
                backdropFilter: 'blur(12px)',
                boxShadow: isHovered ? '0 8px 32px rgba(0,0,0,0.2)' : '0 4px 15px rgba(0,0,0,0.1)',
                transition: 'all 0.3s ease',
                transform: isHovered ? 'translateY(-5px)' : 'translateY(0)',
                color: 'white',
                cursor: 'pointer'
            };

            return (
                <div 
                    style={cardStyle}
                    onMouseEnter={() => setIsHovered(true)}
                    onMouseLeave={() => setIsHovered(false)}
                >
                    <small style={{ opacity: 0.7 }}>{post.date}</small>
                    <h2 style={{ margin: '10px 0' }}>{post.title}</h2>
                    <p style={{ lineHeight: '1.6', opacity: 0.9 }}>{post.excerpt}</p>
                    <div style={{ fontWeight: 'bold', marginTop: '15px' }}>Read More →</div>
                </div>
            );
        };

        const App = () => {
            return (
                <div style={{ padding: '60px 20px', maxWidth: '800px', margin: '0 auto' }}>
                    <header style={{ textAlign: 'center', marginBottom: '50px', color: 'white' }}>
                        <h1 style={{ fontSize: '3rem', marginBottom: '10px' }}>Glass Journal</h1>
                        <p style={{ opacity: 0.8 }}>Thoughts on design, code, and clarity.</p>
                    </header>

                    <main>
                        {blogPosts.map(post => (
                            <BlogCard key={post.id} post={post} />
                        ))}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
