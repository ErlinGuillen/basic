<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
  <title>Music App</title>
  <style>
  @keyframes pulse {
    0% { opacity: 0.8; }
    50% { opacity: 1; transform: scale(1.02); }
    100% { opacity: 0.8; }
  }
  
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    height: 6px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 15px;
    height: 15px;
    background: white;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
  }

  input[type="file"]::file-selector-button {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: white;
    padding: 8px 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
    margin-right: 10px;
  }

  input[type="file"]::file-selector-button:hover {
    background: rgba(255, 255, 255, 0.2);
  }
    
  body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  .ui {
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 30px;
    width: 400px;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
    color: white;
  }

  .controls {
    margin-top: 20px;
    display: flex;
    flex-direction: column; /* Stacked for better spacing */
    gap: 15px;
    padding: 10px;
  }

  .playing {
    animation: pulse 2s infinite ease-in-out;
    color: #fff;
  }
  
  #playBtn {
    background: white;
    border-radius: 50px;
  }

  #playBtn:hover {
    transform: scale(1.05);
  }

  #seekBar {
    flex-grow: 1; /* This makes the seek bar take up all available space */
    cursor: pointer;
    background: linear-gradient(to right, #fff 0%, #fff var(--progress, 0%), rgba(255, 255, 255, 0.1) var(--progress, 0%), rgba(255, 255, 255, 0.1) 100%);
  }

  #timeLabel {
    margin-top: 5px;
  }

  #volumeSlider {
    background: linear-gradient(to right, #fff 0%, #fff var(--vol-progress, 100%), rgba(255, 255, 255, 0.1) var(--vol-progress, 100%), rgba(255, 255, 255, 0.1) 100%);
  }
</style>
</head>
<body>
  <!-- Structure --> 
<div class="ui">
  <h1 style="text-align: center;">🎵 Music App</h1>

  <div id="songTitle" style="text-align: center; margin-bottom: 10px; font-weight: bold;">
    No song selected
  </div>
  
  <input type="file" class="controls" id="fileInput" accept="audio/*">
  <!-- Upload File -->  
  <audio id="player"></audio>
  <!-- Controls -->  
  <div class="controls">
    <button id="playBtn" class="material-symbols-rounded">play_arrow</button>
    <input type="range" id="seekBar" value="0" step="1">
    <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1">
    <span id="muteBtn" class="material-symbols-rounded" style="cursor: pointer; font-size: 20px;">volume_up</span>
    <span id="timeLabel">0:00</span>
    <button id="speedBtn" style="background: none; border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 5px; cursor: pointer; padding: 2px 8px; font-size: 12px;">1x</button>
  </div>
  <!-- Version --> 
  <pre style="text-align: center;">Build 21</pre>
</div>
  <script>
    // const function collection
    const fileInput = document.getElementById('fileInput');
    const player = document.getElementById('player');
    const playBtn = document.getElementById('playBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const timeLabel = document.getElementById('timeLabel');
    const seekBar = document.getElementById('seekBar');
    const muteBtn = document.getElementById('muteBtn');
    const speedBtn = document.getElementById('speedBtn');
    
    // playBtn.addEventListener
    playBtn.addEventListener('click', () => {
      if (player.paused) {
        player.volume = 0;
        player.play();
        playBtn.textContent = 'pause';
    
        // Quick fade in over 500ms
        let fadeIn = setInterval(() => {
           if (player.volume < volumeSlider.value) {
            player.volume = Math.min(player.volume + 0.1, volumeSlider.value);
          } else {
            clearInterval(fadeIn);
          }
        }, 50);
      } else {
        player.pause();
        playBtn.textContent = 'play_arrow';
      }
    });
    
    // volumeSlider.addEventListener
    volumeSlider.addEventListener('input', (e) => {
      player.volume = e.target.value;

      const volPercentage = e.target.value * 100;
      volumeSlider.style.setProperty('--vol-progress', `${volPercentage}%`);
    });
    
    // seekBar.addEventListener collection
    // 1. When the song is ready, set the slider max to the song duration
    player.addEventListener('loadedmetadata', () => {
      seekBar.max = Math.floor(player.duration);
    });
    // 2. Update the slider as the song plays (Add this inside your existing timeupdate listener)
    player.addEventListener('timeupdate', () => { 
     // 1. Update Seek Bar position
      seekBar.value = Math.floor(player.currentTime);
      // 2. Update Progress Gradient
      const percentage = (player.currentTime / player.duration) * 100;
      seekBar.style.setProperty('--progress', `${percentage}%`);
      // 3. Update Time Label
      const formatTime = (time) => {
        const min = Math.floor(time / 60);
        const sec = Math.floor(time % 60).toString().padStart(2, '0');
        return `${min}:${sec}`;
      };
      const current = formatTime(player.currentTime);
      const total = isNaN(player.duration) ? "0:00" : formatTime(player.duration);
      timeLabel.textContent = `${current} / ${total}`;
    });
    // 3. Seek to a new time when the user moves the slider
    seekBar.addEventListener('input', () => {
      player.currentTime = seekBar.value;

      const percentage = (seekBar.value / seekBar.max) * 100;
      seekBar.style.setProperty('--progress', `${percentage}%`);
    });
    
    // MuteBtn.addEventListener   
    muteBtn.addEventListener('click', () => {
      player.muted = !player.muted;
      muteBtn.textContent = player.muted ? 'volume_off' : 'volume_up';
      // Visual feedback: dim the slider if muted
      volumeSlider.style.opacity = player.muted ? '0.5' : '1';
    });
    
    // speedBtn.addEventListener   
    const speeds = [1, 1.5, 2, 0.5];
    let currentSpeedIndex = 0;

    speedBtn.addEventListener('click', () => {
       currentSpeedIndex = (currentSpeedIndex + 1) % speeds.length;
       const newSpeed = speeds[currentSpeedIndex];
       player.playbackRate = newSpeed;
       speedBtn.textContent = newSpeed + 'x';
    });
    
    // fileInput.addEventListener   
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        document.getElementById('songTitle').textContent = file.name;
        document.getElementById('songTitle').classList.add('playing');
        const url = URL.createObjectURL(file);
        player.src = url;
        playBtn.textContent = 'pause';
        player.play();
      }
    });
  </script>
</body>
</html>
