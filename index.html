<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erlin Guillen | Home</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
		    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
		
        }

        .wrapper {
           background: rgba(255, 255, 255, 0.2); 
		   backdrop-filter: blur(10px); 
		   -webkit-backdrop-filter: blur(10px); 
		   padding: 30px; width: 400px;
		   border-radius: 20px; 
		   border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37); color: white;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        p {
            font-size: 1.1rem;
        }

        .status {
            display: inline-block;
            margin-top: 20px;
            color: white;
            font-size: 0.9rem;
            font-weight: bold;
			background: rgba(255, 255, 255, 0.1); 
			border: 1px solid rgba(255, 255, 255, 0.3); 
			padding: 8px 16px; 
			border-radius: 10px; cursor: pointer; 
			transition: 0.3s;
			margin-right: 10px;
        }

		.status:hover { 
		    background: rgba(255, 255, 255, 0.2); 
		}
 
        footer {
            margin-top: 30px;
            font-family: monospace;
            color: #484f58;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <nav></nav>
        <header>
            <h1>Erlin Guillen</h1>
        </header>
        
        <main>
            <p>Welcome to my basic homepage. I build music players, audio visualizers, and creative edits.</p>
            <div class="status">Coming soon on music</div>
        </main>

        <footer>
            <pre style="color:white">Build 1</pre>
        </footer>
    </div>

</body>
</html>
