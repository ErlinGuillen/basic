<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS-DOS Executive</title>
    <style>
        :root {
            --win1-blue: #0000AA; /* Header Blue */
            --win1-teal: #00AAAA; /* Classic Background/Border Teal */
            --win1-white: #FFFFFF;
            --win1-black: #000000;
        }

        body {
            background-color: var(--win1-teal);
            font-family: "Courier New", Courier, monospace;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* Top Menu Bar */
        .menu-bar {
            background-color: var(--win1-white);
            border-bottom: 2px solid var(--win1-black);
            padding: 5px 10px;
            font-weight: bold;
            display: flex;
            gap: 20px;
            font-size: 14px;
        }

        /* Main Window Container */
        .window {
            border: 2px solid var(--win1-black);
            margin: 10px;
            height: 90vh;
            display: flex;
            flex-direction: column;
        }

        /* Title Bar */
        .title-bar {
            background-color: var(--win1-blue);
            color: var(--win1-white);
            padding: 4px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--win1-black);
        }

        .title-text {
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Command/Icon Area */
        .icon-bar {
            background-color: var(--win1-white);
            border-bottom: 2px solid var(--win1-black);
            padding: 5px;
            display: flex;
            gap: 10px;
        }

        .drive-icon {
            border: 1px solid var(--win1-black);
            padding: 2px 8px;
            font-size: 12px;
        }

        /* Content Area */
        .content {
            background-color: var(--win1-white);
            flex-grow: 1;
            padding: 10px; /* Reduced padding */
            display: grid;
            /* This makes the columns much narrower */
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); 
            grid-auto-rows: min-content; /* Stops items from stretching vertically */
            gap: 2px 15px; /* Very small vertical gap, larger horizontal gap */
            align-content: start; /* Keeps everything at the top */
        }

        .file-item {
            cursor: pointer;
            padding: 1px 2px;
            font-size: 12px; /* Smaller font for that retro density */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-item:hover {
            background-color: var(--win1-blue);
            color: var(--win1-white);
            outline: 1px dotted var(--win1-white);
            outline-offset: -2px;
        }
    </style>
</head>
<body>

    <div class="menu-bar">
        <span>File</span>
        <span>View</span>
        <span>Special</span>
    </div>

    <div class="window">
        <div class="title-bar">
            <span class="control">[-]</span>
            <span class="title-text">MS-DOS Executive</span>
            <span class="control">[↑]</span>
        </div>

        <div class="icon-bar">
            <div class="drive-icon">A:</div>
            <div class="drive-icon" style="background-color: var(--win1-black); color: white;">C:</div>
        </div>

        <div class="content">
            <div class="file-item">CALC.EXE</div>
            <div class="file-item">CALENDAR.EXE</div>
            <div class="file-item">CARDFILE.EXE</div>
            <div class="file-item">CLIPBRD.EXE</div>
            <div class="file-item">CLOCK.EXE</div>
            <div class="file-item">CONTROL.EXE</div>
            <div class="file-item">NOTEPAD.EXE</div>
            <div class="file-item">PAINT.EXE</div>
            <div class="file-item">REVERSI.EXE</div>
            <div class="file-item">TERMINAL.EXE</div>
            <div class="file-item">WRITE.EXE</div>
        </div>

        <div class="desktop-icons" style="position: fixed; bottom: 0; width: 100%; height: 50px; background: var(--win1-teal); border-top: 2px solid black; display: flex; align-items: center; padding-left: 10px;">
            <div style="border: 2px solid black; background: white; padding: 2px 5px; font-size: 10px; font-weight: bold;">PAINT</div>
        </div>
    </div>
</body>
</html>
