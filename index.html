<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass UI Blog Feed</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed; /* Keeps gradient still while scrolling */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

<script type="text/babel">
    const blogPosts = [
        { id: 1, title: "The Art of Glassmorphism", date: "May 9, 2026", excerpt: "Explore how translucency and background blurs are defining the next decade of visual design." },
        { id: 2, title: "React Without Build Tools", date: "May 8, 2026", excerpt: "Sometimes simplicity wins. Learn how to use Babel CDN for rapid prototyping and small projects." },
        { id: 3, title: "Why Color Gradients Matter", date: "May 7, 2026", excerpt: "A deep dive into how vibrant backgrounds make glass UI elements truly pop." }
    ];

    const BlogCard = ({ post, darkMode }) => {
        const [isHovered, setIsHovered] = React.useState(false);

        const cardStyle = {
            background: darkMode 
                ? (isHovered ? 'rgba(255, 255, 255, 0.2)' : 'rgba(255, 255, 255, 0.1)') 
                : (isHovered ? 'rgba(255, 255, 255, 0.7)' : 'rgba(255, 255, 255, 0.4)'),
            borderRadius: '20px',
            padding: '30px',
            marginBottom: '30px',
            border: darkMode ? '1px solid rgba(255, 255, 255, 0.2)' : '1px solid rgba(255, 255, 255, 0.5)',
            backdropFilter: 'blur(12px)',
            boxShadow: '0 8px 32px rgba(0,0,0,0.1)',
            transition: 'all 0.3s ease',
            transform: isHovered ? 'translateY(-5px)' : 'translateY(0)',
            color: darkMode ? 'white' : '#1a202c',
            cursor: 'pointer'
        };

        return (
            <div 
                style={cardStyle}
                onMouseEnter={() => setIsHovered(true)}
                onMouseLeave={() => setIsHovered(false)}
            >
                <small style={{ opacity: 0.6 }}>{post.date}</small>
                <h2 style={{ margin: '10px 0' }}>{post.title}</h2>
                <p style={{ lineHeight: '1.6', opacity: 0.8 }}>{post.excerpt}</p>
                <div style={{ fontWeight: 'bold', marginTop: '15px' }}>Read More →</div>
            </div>
        );
    };

    const App = () => {
        const [darkMode, setDarkMode] = React.useState(true);

        const appStyle = {
            minHeight: '100vh',
            transition: 'background 0.5s ease',
            background: darkMode 
                ? 'linear-gradient(135deg, #1a1a2e 0%, #16213e 100%)' 
                : 'linear-gradient(135deg, #e2e8f0 0%, #cbd5e0 100%)',
            padding: '60px 20px'
        };

        return (
            <div style={appStyle}>
                <div style={{ maxWidth: '800px', margin: '0 auto' }}>
                    <header style={{ textAlign: 'center', marginBottom: '50px', color: darkMode ? 'white' : '#1a202c' }}>
                        <button 
                            onClick={() => setDarkMode(!darkMode)}
                            style={{
                                padding: '10px 20px',
                                borderRadius: '50px',
                                border: 'none',
                                cursor: 'pointer',
                                background: darkMode ? 'white' : '#1a202c',
                                color: darkMode ? '#1a202c' : 'white',
                                fontWeight: 'bold',
                                marginBottom: '20px'
                            }}
                        >
                            {darkMode ? '☀️ Light Mode' : '🌙 Dark Mode'}
                        </button>
                        <h1 style={{ fontSize: '3rem', margin: '10px 0' }}>Glass Journal</h1>
                        <p style={{ opacity: 0.8 }}>Dynamic themes with React State.</p>
                    </header>

                    <main>
                        {blogPosts.map(post => (
                            <BlogCard key={post.id} post={post} darkMode={darkMode} />
                        ))}
                    </main>
                </div>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
