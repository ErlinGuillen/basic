<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass UI Blog Feed</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed; /* Keeps gradient still while scrolling */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

<script type="text/babel">
    const blogPosts = [
        { id: 1, title: "The Art of Glassmorphism", date: "May 9, 2026", img: "https://picsum.photos/id/10/800/400", excerpt: "Explore how translucency and background blurs are defining the next decade of visual design." },
        { id: 2, title: "React Without Build Tools", date: "May 8, 2026", img: "https://picsum.photos/id/180/800/400", excerpt: "Sometimes simplicity wins. Learn how to use Babel CDN for rapid prototyping and small projects." },
    ];

    const BlogCard = ({ post, darkMode }) => {
        const [isHovered, setIsHovered] = React.useState(false);

        const cardStyle = {
            background: darkMode ? 'rgba(255, 255, 255, 0.1)' : 'rgba(255, 255, 255, 0.4)',
            borderRadius: '24px',
            marginBottom: '40px',
            overflow: 'hidden',
            border: '1px solid rgba(255, 255, 255, 0.3)',
            backdropFilter: 'blur(15px)',
            transition: '0.3s ease',
            transform: isHovered ? 'scale(1.02)' : 'scale(1)',
            color: darkMode ? 'white' : '#1a202c',
        };

        return (
            <div style={cardStyle} onMouseEnter={() => setIsHovered(true)} onMouseLeave={() => setIsHovered(false)}>
                <img src={post.img} style={{ width: '100%', height: '200px', objectFit: 'cover', opacity: 0.8 }} />
                <div style={{ padding: '30px' }}>
                    <small style={{ opacity: 0.6 }}>{post.date}</small>
                    <h2 style={{ margin: '10px 0' }}>{post.title}</h2>
                    <p style={{ opacity: 0.8 }}>{post.excerpt}</p>
                </div>
            </div>
        );
    };

    const Modal = ({ isOpen, onClose, darkMode }) => {
        if (!isOpen) return null;
        return (
            <div style={{
                position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
                backgroundColor: 'rgba(0,0,0,0.5)', display: 'flex',
                alignItems: 'center', justifyContent: 'center', zIndex: 1000,
                backdropFilter: 'blur(5px)'
            }}>
                <div style={{
                    background: darkMode ? 'rgba(30, 30, 50, 0.8)' : 'rgba(255, 255, 255, 0.8)',
                    padding: '40px', borderRadius: '30px', maxWidth: '400px', width: '90%',
                    border: '1px solid rgba(255,255,255,0.4)', backdropFilter: 'blur(20px)',
                    textAlign: 'center', color: darkMode ? 'white' : '#1a202c'
                }}>
                    <h2>Let's Connect</h2>
                    <p>Building something cool? Drop me a line.</p>
                    <input type="text" placeholder="Your Email" style={{ width: '100%', padding: '10px', marginBottom: '10px', borderRadius: '10px', border: 'none' }} />
                    <button onClick={onClose} style={{ padding: '10px 20px', borderRadius: '10px', border: 'none', background: '#667eea', color: 'white', cursor: 'pointer' }}>Send</button>
                </div>
            </div>
        );
    };

    const App = () => {
        const [darkMode, setDarkMode] = React.useState(true);
        const [isModalOpen, setIsModalOpen] = React.useState(false);

        const appStyle = {
            minHeight: '100vh',
            transition: '0.5s',
            background: darkMode ? '#1a1a2e' : '#e2e8f0',
            padding: '60px 20px'
        };

        return (
            <div style={appStyle}>
                <div style={{ maxWidth: '800px', margin: '0 auto' }}>
                    <header style={{ textAlign: 'center', color: darkMode ? 'white' : '#1a202c' }}>
                        <div style={{ display: 'flex', justifyContent: 'center', gap: '10px', marginBottom: '20px' }}>
                            <button onClick={() => setDarkMode(!darkMode)} style={{ padding: '10px', borderRadius: '12px', border: 'none', cursor: 'pointer' }}>
                                {darkMode ? '☀️' : '🌙'}
                            </button>
                            <button onClick={() => setIsModalOpen(true)} style={{ padding: '10px 20px', borderRadius: '12px', border: 'none', cursor: 'pointer', background: '#667eea', color: 'white' }}>
                                Contact
                            </button>
                        </div>
                        <h1>Glass Journal</h1>
                    </header>

                    <main style={{ marginTop: '40px' }}>
                        {blogPosts.map(post => <BlogCard key={post.id} post={post} darkMode={darkMode} />)}
                    </main>

                    <Modal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} darkMode={darkMode} />
                </div>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
