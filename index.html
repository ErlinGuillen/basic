<!DOCTYPE html>
<html>
<head>
    <title>MS-DOS Executive</title>
</head>
<body bgcolor="#FFFFFF" text="#000000">

    <table border="1" width="100%" cellpadding="5" cellspacing="0">
        <tr bgcolor="#0000AA">
            <td>
                <font color="#FFFFFF"><b>MS-DOS Executive</b></font>
            </td>
            <td align="right">
                <font color="#FFFFFF">[_] [^] [X]</font>
            </td>
        </tr>
    </table>

    <table border="1" width="100%" cellpadding="2" cellspacing="0">
        <tr>
            <td>
                File &nbsp; View &nbsp; Special
            </td>
        </tr>
    </table>

    <table border="0" width="100%" height="400">
        <tr>
            <td width="50%" valign="top">
                <table border="1" width="100%" height="100%" cellpadding="10">
                    <tr bgcolor="#0000AA">
                        <td><font color="#FFFFFF"><b>Clock</b></font></td>
                    </tr>
                    <tr>
                        <td align="center" valign="middle">
                            <p>12:34 PM</p>
                            <p>May 9, 2026</p>
                        </td>
                    </tr>
                </table>
            </td>

            <td width="50%" valign="top">
                <table border="1" width="100%" height="100%" cellpadding="10">
                    <tr bgcolor="#0000AA">
                        <td><font color="#FFFFFF"><b>Note Pad</b></font></td>
                    </tr>
                    <tr>
                        <td valign="top">
                            <p>Welcome to 1985.</p>
                            <ul>
                                <li>No CSS required</li>
                                <li>Tiled windows only</li>
                                <li>High contrast</li>
                            </ul>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>

    <hr>
    <table border="0" width="100%">
        <tr>
            <td><b>A:</b> \WINDOWS</td>
            <td align="right">384K Free Memory</td>
        </tr>
    </table>

</body>
</html>
