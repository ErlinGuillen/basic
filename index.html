<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Music Player</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #dbeafe 0%, #93c5fd 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
.animate-blob { animation: blob 7s infinite; }
.animation-delay-2000 { animation-delay: 2s; }
    </style>
</head>
<body>
    <div id="root"></div>

<script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const MusicCard = () => {
        const [isPlaying, setIsPlaying] = useState(false);
        const [progress, setProgress] = useState(0);
        const [volume, setVolume] = useState(0.7);
        const audioRef = useRef(new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'));

        // 1. Sync Playback & Browser Tab Title
        const togglePlay = () => {
            if (isPlaying) {
                audioRef.current.pause();
                document.title = "Paused | Glass Player";
            } else {
                audioRef.current.play();
                document.title = "♪ Now Playing...";
            }
            setIsPlaying(!isPlaying);
        };

        // 2. Handle Volume
        const handleVolumeChange = (e) => {
            const val = parseFloat(e.target.value);
            setVolume(val);
            audioRef.current.volume = val;
        };

        // 3. Update progress bar
        useEffect(() => {
            const audio = audioRef.current;
            const updateProgress = () => {
                setProgress((audio.currentTime / audio.duration) * 100 || 0);
            };
            audio.addEventListener('timeupdate', updateProgress);
            return () => audio.removeEventListener('timeupdate', updateProgress);
        }, []);

        return (
            <div className="relative group">
                {/* Background Blobs */}
                <div className="absolute -top-10 -left-10 w-48 h-48 bg-blue-400 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-blob"></div>
                <div className="absolute -bottom-10 -right-10 w-48 h-48 bg-cyan-300 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-blob animation-delay-2000"></div>

                {/* Main Card with Hover Glow */}
                <div className="relative w-80 overflow-hidden rounded-[2.5rem] border border-white/40 bg-white/30 p-8 shadow-2xl backdrop-blur-xl transition-all duration-500 group-hover:shadow-blue-400/30 group-hover:border-white/60">
                    
                    {/* Album Art */}
                    <div className="relative mb-8 aspect-square w-full overflow-hidden rounded-3xl shadow-lg border border-white/20">
                        <div className="flex h-full w-full items-center justify-center bg-gradient-to-br from-blue-500 to-blue-700 transition-transform duration-700 group-hover:scale-110">
                            <i className="lucide-music text-white/40 w-16 h-16"></i>
                        </div>
                    </div>

                    {/* Info */}
                    <div className="mb-6 text-center">
                        <h2 className="text-2xl font-bold text-blue-900 tracking-tight">Ethereal Blue</h2>
                        <p className="text-blue-800/60 font-medium">Glass Synthesis</p>
                    </div>

                    {/* Progress */}
                    <div className="mb-6">
                        <div className="h-1.5 w-full rounded-full bg-blue-900/10">
                            <div className="h-1.5 rounded-full bg-blue-600 shadow-[0_0_12px_rgba(37,99,235,0.4)] transition-all duration-300" style={{ width: `${progress}%` }}></div>
                        </div>
                    </div>

                    {/* Controls */}
                    <div className="flex items-center justify-center gap-6 mb-8">
                        <button className="text-blue-900/60 hover:text-blue-900 transition transform active:scale-90"><i className="lucide-skip-back fill-current w-5 h-5"></i></button>
                        <button onClick={togglePlay} className={`flex h-16 w-16 items-center justify-center rounded-full text-white shadow-lg transition-all duration-300 hover:scale-110 active:scale-95 ${isPlaying ? 'bg-blue-700 shadow-blue-500/50 rotate-180' : 'bg-blue-600'}`}>
                            {isPlaying ? <i className="lucide-pause fill-current w-6 h-6 rotate-180"></i> : <i className="lucide-play fill-current w-6 h-6 ml-1"></i>}
                        </button>
                        <button className="text-blue-900/60 hover:text-blue-900 transition transform active:scale-90"><i className="lucide-skip-forward fill-current w-5 h-5"></i></button>
                    </div>

                    {/* Volume Slider - Fades in on card hover */}
                    <div className="flex items-center gap-3 px-2 opacity-0 group-hover:opacity-100 transition-opacity duration-500">
                        <i className={`lucide-volume-${volume === 0 ? 'x' : volume < 0.5 ? '1' : '2'} text-blue-900/40 w-4 h-4`}></i>
                        <input 
                            type="range" min="0" max="1" step="0.01" 
                            value={volume} 
                            onChange={handleVolumeChange}
                            className="w-full h-1 bg-blue-900/10 rounded-lg appearance-none cursor-pointer accent-blue-600"
                        />
                    </div>
                </div>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MusicCard />);
</script>
</body>
</html>
