<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Music App</title>
  <style>
  </style>
</head>
<style>
  @keyframes pulse {
    0% { opacity: 0.8; }
    50% { opacity: 1; transform: scale(1.02); }
    100% { opacity: 0.8; }
  }
  
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    height: 6px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 15px;
    height: 15px;
    background: white;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
  }
  
  body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  .ui {
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 30px;
    width: 400px;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
    color: white;
  }

  .controls {
    margin-top: 20px;
    display: flex;
    flex-direction: column; /* Stacked for better spacing */
    gap: 15px;
    padding: 10px;
  }

  .playing {
    animation: pulse 2s infinite ease-in-out;
    color: #fff;
  }
  
  #playBtn {
    background: white;
    color: #764ba2;
    font-weight: bold;
    border: none;
    padding: 12px;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.2s;
  }

  #playBtn:hover {
    transform: scale(1.05);
  }

  #playBtn {
    padding: 8px 16px;
    cursor: pointer;
    border-radius: 4px;
    border: 1px solid #ccc;
  }
  
  #seekBar {
    flex-grow: 1; /* This makes the seek bar take up all available space */
    cursor: pointer;
  }
</style>
<body>
  <!-- Structure --> 
<div class="ui">
  <h1 style="text-align: center;">🎵 Music App</h1>

  <div id="songTitle" style="text-align: center; margin-bottom: 10px; font-weight: bold;">
    No song selected
  </div>
  
  <input type="file" class="controls" id="fileInput" accept="audio/*">
  <!-- Upload File -->  
  <audio id="player"></audio>
  <!-- Controls -->  
  <div class="controls">
    <button id="playBtn">Play</button>
    <input type="range" id="seekBar" value="0" step="1">
    <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1">
    <span id="timeLabel">0:00</span>
  </div>
  <!-- Version --> 
  <pre style="text-align: center;">Build 14</pre>
</div>
  <script>
    // const function collection
    const fileInput = document.getElementById('fileInput');
    const player = document.getElementById('player');
    const playBtn = document.getElementById('playBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const timeLabel = document.getElementById('timeLabel');
    const seekBar = document.getElementById('seekBar');
    
    // playBtn.addEventListener
    playBtn.addEventListener('click', () => {
      const songTitle = document.getElementById('songTitle');
      if (player.paused) {
        player.play();
        playBtn.textContent = 'Pause';
        songTitle.classList.add('playing'); // Start pulse
      } else {
        player.pause();
        playBtn.textContent = 'Play';
        songTitle.classList.remove('playing'); // Stop pulse
      }
    });
    
    // volumeSlider.addEventListener
    volumeSlider.addEventListener('input', (e) => {
      player.volume = e.target.value;
    });
    
    // player.addEventListener
    player.addEventListener('timeupdate', () => {
      const minutes = Math.floor(player.currentTime / 60);
      const seconds = Math.floor(player.currentTime % 60).toString().padStart(2, '0');
      timeLabel.textContent = `${minutes}:${seconds}`;
    });
    
    // seekBar.addEventListener collection
    // 1. When the song is ready, set the slider max to the song duration
    player.addEventListener('loadedmetadata', () => {
      seekBar.max = Math.floor(player.duration);
    });
    // 2. Update the slider as the song plays (Add this inside your existing timeupdate listener)
    player.addEventListener('timeupdate', () => {
      seekBar.value = Math.floor(player.currentTime);
      // ... your existing timeLabel code ...
    });
    // 3. Seek to a new time when the user moves the slider
    seekBar.addEventListener('input', () => {
      player.currentTime = seekBar.value;
    });
    
    // fileInput.addEventListener   
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        document.getElementById('songTitle').textContent = file.name;
        const url = URL.createObjectURL(file);
        player.src = url;
        playBtn.textContent = 'Pause';
        player.play();
      }
    });
  </script>
</body>
</html>
