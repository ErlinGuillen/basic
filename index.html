<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch the Square - Glass UI</title>
    <style>
        :root {
            --bg-color: #e0f2fe;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --accent-blue: #0ea5e9;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #bae6fd 0%, #e0f2fe 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Glassmorphism Container */
        .game-container {
            position: relative;
            width: 90vw;
            max-width: 600px;
            height: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            overflow: hidden;
            cursor: crosshair;
        }

        .stats-panel {
            margin-bottom: 20px;
            padding: 15px 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            color: #0369a1;
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            gap: 20px;
        }

        /* The Target Square */
        #target {
            position: absolute;
            width: 50px;
            height: 50px;
            background: var(--accent-blue);
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.4);
            transition: left 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), top 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            z-index: 10;
        }

        #target:hover {
            transform: scale(1.1);
        }

        #target:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>

    <div class="stats-panel">
        <div>Score: <span id="score">0</span></div>
        <div>Time: <span id="timer">30</span>s</div>
    </div>

    <div class="game-container" id="game-area">
        <div id="target"></div>
    </div>

    <script>
        const target = document.getElementById('target');
        const gameArea = document.getElementById('game-area');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');

        let score = 0;
        let timeLeft = 30;
        let gameActive = true;
        let mouseX = 0;
        let mouseY = 0;

        gameArea.addEventListener('mousemove', (e) => {
            const rect = gameArea.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;

            const targetRect = target.getBoundingClientRect();
            const targetCenterX = targetRect.left + targetRect.width / 2 - rect.left;
            const targetCenterY = targetRect.top + targetRect.height / 2 - rect.top;
    
            const distance = Math.sqrt(
                Math.pow(targetCenterX - mouseX, 2) + 
                Math.pow(targetCenterY - mouseY, 2)
            );

            if (gameActive && distance < 100) {
                moveSquare();
            }
        });
        // Function to move the square to a random position
        function moveSquare() {
            if (!gameActive) return;

            const padding = 20;
            const maxX = gameArea.clientWidth - target.clientWidth;
            const maxY = gameArea.clientHeight - target.clientHeight;

            const corners = [
                { x: padding, y: padding },             // Top Left
                { x: maxX, y: padding },                // Top Right
                { x: padding, y: maxY },                // Bottom Left
                { x: maxX, y: maxY }                    // Bottom Right
            ];

            let furthestCorner = corners[0];
            let maxDistance = 0;

            corners.forEach(corner => {
                const dist = Math.sqrt(
                    Math.pow(corner.x - mouseX, 2) + Math.pow(corner.y - mouseY, 2)
                );
                if (dist > maxDistance) {
                    maxDistance = dist;
                    furthestCorner = corner;
                }
            });

            const jitterX = (Math.random() - 0.5) * 40;
            const jitterY = (Math.random() - 0.5) * 40;

            target.style.left = `${Math.min(maxX, Math.max(padding, furthestCorner.x + jitterX))}px`;
            target.style.top = `${Math.min(maxY, Math.max(padding, furthestCorner.y + jitterY))}px`;
        }
        // Handle the "Catch"
        target.addEventListener('click', () => {
            if (gameActive) {
                score++;
                scoreDisplay.textContent = score;
                moveSquare();
            }
        });
        // Countdown Timer
        const countdown = setInterval(() => {
            timeLeft--;
            timerDisplay.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                gameActive = false;
                alert(`Game Over! Your final score is: ${score}`);
                location.reload(); // Reset the game
            }
        }, 1000);
        // Initial placement
        moveSquare();
    </script>
</body>
</html>
