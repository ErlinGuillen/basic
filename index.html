<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Music App</title>
  <style>
  </style>
</head>
<style>
  .controls {
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 15px;
    background: #f4f4f4;
    padding: 10px;
    border-radius: 8px;
    width: fit-content;
  }

  #playBtn {
    padding: 8px 16px;
    cursor: pointer;
    border-radius: 4px;
    border: 1px solid #ccc;
  }
  #seekBar {
    flex-grow: 1; /* This makes the seek bar take up all available space */
    cursor: pointer;
  }
  .ui{
    background: rgba(225, 225, 225, 1);
    padding: 10px;
    width: fit-content;
    border-radius: 8px;
  }
</style>
<body>
  <!-- Structure --> 
<div class="ui">
  <h1 style="text-align: center;">🎵 Music App</h1>
  <input type="file" class="controls" id="fileInput" accept="audio/*">
  <!-- Upload File -->  
  <audio id="player"></audio>
  <!-- Controls -->  
  <div class="controls">
    <button id="playBtn">Play</button>
    <input type="range" id="seekBar" value="0" step="1">
    <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1">
    <span id="timeLabel">0:00</span>
  </div>
  <!-- Version --> 
  <pre style="text-align: center;">Build 10</pre>
</div>
  <script>
    const fileInput = document.getElementById('fileInput');
    const player = document.getElementById('player');
    const playBtn = document.getElementById('playBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const timeLabel = document.getElementById('timeLabel');
    const seekBar = document.getElementById('seekBar');
    // playBtn.addEventListener
    playBtn.addEventListener('click', () => {
     if (player.paused) {
       player.play();
       playBtn.textContent = 'Pause';
     } else {
       player.pause();
       playBtn.textContent = 'Play';
     }
    });
    // volumeSlider.addEventListener
    volumeSlider.addEventListener('input', (e) => {
      player.volume = e.target.value;
    });
    // player.addEventListener
    player.addEventListener('timeupdate', () => {
      const minutes = Math.floor(player.currentTime / 60);
      const seconds = Math.floor(player.currentTime % 60).toString().padStart(2, '0');
      timeLabel.textContent = `${minutes}:${seconds}`;
    });
    // 1. When the song is ready, set the slider max to the song duration
    player.addEventListener('loadedmetadata', () => {
      seekBar.max = Math.floor(player.duration);
    });
    // 2. Update the slider as the song plays (Add this inside your existing timeupdate listener)
    player.addEventListener('timeupdate', () => {
      seekBar.value = Math.floor(player.currentTime);
      // ... your existing timeLabel code ...
    });
    // 3. Seek to a new time when the user moves the slider
    seekBar.addEventListener('input', () => {
      player.currentTime = seekBar.value;
    });
    // fileInput.addEventListener   
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const url = URL.createObjectURL(file);
        player.src = url;
        playBtn.textContent = 'Pause';
        player.play();
      }
    });
  </script>
</body>
</html>
