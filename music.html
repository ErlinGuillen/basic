<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
  <title>Music App</title>
  <style>
  * {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: white !important;
    box-sizing: border-box;
  }
    
  @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; transform: scale(1.02); } 100% { opacity: 0.8; } }
  input[type="range"] { -webkit-appearance: none; width: 100%; background: rgba(255, 255, 255, 0.1); border-radius: 10px; height: 6px; outline: none; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 15px; height: 15px; background: white; border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px rgba(0, 0, 0, 0.2); }
  input[type="file"]::file-selector-button { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); color: white; padding: 8px 16px; border-radius: 10px; cursor: pointer; transition: 0.3s; margin-right: 10px; }
  input[type="file"]::file-selector-button:hover { background: rgba(255, 255, 255, 0.2); }
  body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden; /* Important for the app feel */
  }
  .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 15px; padding: 10px; }
  .playing { animation: pulse 2s infinite ease-in-out; color: #fff; }
  .theme-dot { transition: transform 0.2s, border-width 0.2s; }
  .theme-dot:hover { transform: scale(1.3); border-width: 2px !important; }
  #playBtn { background: white; border-radius: 50px; cursor: pointer; transition: transform 0.2s; }
  #playBtn:hover { transform: scale(1.1); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }  
  #seekBar { flex-grow: 1; cursor: pointer; background: linear-gradient(to right, #fff 0%, #fff var(--progress, 0%), rgba(255, 255, 255, 0.1) var(--progress, 0%), rgba(255, 255, 255, 0.1) 100%); }
  #timeLabel { margin-top: 5px; }
  #volumeSlider { background: linear-gradient(to right, #fff 0%, #fff var(--vol-progress, 100%), rgba(255, 255, 255, 0.1) var(--vol-progress, 100%), rgba(255, 255, 255, 0.1) 100%); }
  #songTitle { text-align: center; margin-bottom: 10px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
  @keyframes glass-pulse {
    0% { transform: scale(1); box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37); }
    50% { transform: scale(1.02); box-shadow: 0 8px 32px rgba(31, 38, 135, 0.6); }
    100% { transform: scale(1); box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37); }
  }
  .ui-pulse {
     animation: glass-pulse 2s infinite ease-in-out;
  }
  @keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .album-art {
    width: 120px;
    height: 120px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 50%;
    margin: 20px auto;
    display: flex;
    justify-content: center;
    align-items: center;
    border: 2px solid rgba(255, 255, 255, 0.3);
    font-size: 50px;
  }
  .rotating {
     animation: rotate 5s linear infinite;
  } 
.wrapper {
    display: flex;
    width: 95vw;
    height: 90vh;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 24px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    overflow: hidden;
}
.content-area {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    position: relative;
}
.tabs-nav {
    width: 200px;
    background: rgba(0, 0, 0, 0.2);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 20px 0;
    border-right: 1px solid rgba(255, 255, 255, 0.1);
}
.tab-btn {
    background: none;
    border: none;
    color: white;
    padding: 15px 25px;
    text-align: left;
    width: 100%;
    cursor: pointer;
    opacity: 0.6;
    transition: 0.3s;
    font-size: 1rem;
    display: flex;
    align-items: center;
    gap: 12px;
}
.tab-btn:hover {
    opacity: 1;
    background: rgba(255, 255, 255, 0.1);
}
.tab-btn.active {
    opacity: 1;
    background: rgba(255, 255, 255, 0.15);
    border-left: 4px solid #fff;
    font-weight: bold;
}
.tabs-nav a.tab-btn {
    text-decoration: none;
}
.tab-btn i {
    width: 20px;
    text-align: center;
}
.social-links {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 25px;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    gap: 15px;
}
.ui {
    width: 90%;
    max-width: 420px; /* Stops the player from getting too wide */
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 30px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}
.tab-btn a {
    text-decoration: none;
    color: white;
}
</style>
</head>
<body>
<div class="wrapper">
    <div class="tabs-nav">
        <div class="main-tabs">
            <a href="index.html" class="tab-btn" style="text-decoration:none;"><i class="fas fa-home"></i> Home</a>
            <button class="tab-btn active"><i class="fas fa-play"></i> Player</button>
            <button class="tab-btn"><i class="fas fa-list"></i> Playlist</button>
        </div>
        <div class="social-links" style="flex-direction: row; gap: 10px;">
            <div class="theme-dot" onclick="setTheme('linear-gradient(135deg, #667eea 0%, #764ba2 100%)')" style="background: #764ba2; width: 15px; height: 15px; border-radius: 50%; cursor: pointer; border: 1px solid white;"></div>
            <div class="theme-dot" onclick="setTheme('linear-gradient(135deg, #2af598 0%, #009efd 100%)')" style="background: #009efd; width: 15px; height: 15px; border-radius: 50%; cursor: pointer; border: 1px solid white;"></div>
            <div class="theme-dot" onclick="setTheme('linear-gradient(135deg, #f093fb 0%, #f5576c 100%)')" style="background: #f5576c; width: 15px; height: 15px; border-radius: 50%; cursor: pointer; border: 1px solid white;"></div>
        </div>
    </div>
    <div class="content-area">
        <div class="ui">
            <h1 style="text-align: center;">🎵 Music App</h1>
            <div class="album-art" id="art">🎵</div>
            <div id="songTitle">No song selected</div>
            <input type="file" id="fileInput" accept="audio/*">
            <audio id="player"></audio>
            <div class="controls">
                <button id="playBtn" class="material-symbols-rounded">play_arrow</button>
                <input type="range" id="seekBar" value="0" step="1">
                <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1">
                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: 5px;">
                    <span id="muteBtn" class="material-symbols-rounded" style="cursor: pointer; font-size: 22px;">volume_up</span>
                    <span id="timeLabel" style="font-size: 14px; font-family: monospace;">0:00 / 0:00</span>
                    <button id="speedBtn" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 5px; cursor: pointer; padding: 4px 10px; font-size: 12px;">1x</button>
                </div>
            </div>
            <pre style="text-align: center; margin-top: 20px; opacity: 0.5;">Build 30.5</pre>
        </div>
    </div>
</div>
  <script>
    // const function collection
    const fileInput = document.getElementById('fileInput');
    const player = document.getElementById('player');
    const playBtn = document.getElementById('playBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const timeLabel = document.getElementById('timeLabel');
    const seekBar = document.getElementById('seekBar');
    const muteBtn = document.getElementById('muteBtn');
    const speedBtn = document.getElementById('speedBtn');
    // playBtn.addEventListener
    playBtn.addEventListener('click', () => {
        const uiContainer = document.querySelector('.ui'); // Get the UI container
        if (player.paused) {
            player.volume = 0; 
            player.play(); 
            playBtn.textContent = 'pause';
            songTitle.classList.add('playing');
            uiContainer.classList.add('ui-pulse'); // ADD PULSE HERE
            document.getElementById('art').classList.add('rotating');

            let fadeIn = setInterval(() => {
                if (player.volume < volumeSlider.value) {
                    player.volume = Math.min(player.volume + 0.1, volumeSlider.value);
                } else {
                    clearInterval(fadeIn);
                }
            }, 50);
        } else {
            player.pause(); 
            playBtn.textContent = 'play_arrow';
            songTitle.classList.remove('playing');
            uiContainer.classList.remove('ui-pulse'); // REMOVE PULSE HERE
            document.getElementById('art').classList.remove('rotating');
        }
    });
    // volumeSlider.addEventListener
    const savedVolume = localStorage.getItem('savedVolume');
    if (savedVolume !== null) {
      player.volume = savedVolume;
      volumeSlider.value = savedVolume;
      volumeSlider.style.setProperty('--vol-progress', `${savedVolume * 100}%`);
    }
    volumeSlider.addEventListener('input', (e) => {
      player.volume = e.target.value;
      const volPercentage = e.target.value * 100;
      volumeSlider.style.setProperty('--vol-progress', `${volPercentage}%`);
      localStorage.setItem('savedVolume', e.target.value);
    });
    // seekBar.addEventListener collection
    // 1. When the song is ready, set the slider max to the song duration
    player.addEventListener('loadedmetadata', () => {
      seekBar.max = Math.floor(player.duration);
    });
    // 2. Update the slider as the song plays (Add this inside your existing timeupdate listener)
    player.addEventListener('timeupdate', () => { 
     // 1. Update Seek Bar position
      seekBar.value = Math.floor(player.currentTime);
      // 2. Update Progress Gradient
      const percentage = (player.currentTime / player.duration) * 100;
      seekBar.style.setProperty('--progress', `${percentage}%`);
      // 3. Update Time Label
      const formatTime = (time) => {
        const min = Math.floor(time / 60);
        const sec = Math.floor(time % 60).toString().padStart(2, '0');
        return `${min}:${sec}`;
      };
      const current = formatTime(player.currentTime);
      const total = isNaN(player.duration) ? "0:00" : formatTime(player.duration);
      timeLabel.textContent = `${current} / ${total}`;
    });
    // 3. Seek to a new time when the user moves the slider
    seekBar.addEventListener('input', (e) => {
      player.currentTime = e.target.value;
    });
    // MuteBtn.addEventListener   
    muteBtn.addEventListener('click', () => {
      player.muted = !player.muted;
      muteBtn.textContent = player.muted ? 'volume_off' : 'volume_up';
      // Visual feedback: dim the slider if muted
      volumeSlider.style.opacity = player.muted ? '0.5' : '1';
    });
    // speedBtn.addEventListener   
    const speeds = [1, 1.5, 2, 0.5];
    let currentSpeedIndex = 0;

    speedBtn.addEventListener('click', () => {
       currentSpeedIndex = (currentSpeedIndex + 1) % speeds.length;
       const newSpeed = speeds[currentSpeedIndex];
       player.playbackRate = newSpeed;
       speedBtn.textContent = newSpeed + 'x';
    });
    // fileInput.addEventListener   
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        document.getElementById('songTitle').textContent = file.name;
        document.getElementById('songTitle').classList.add('playing');
        const url = URL.createObjectURL(file);
        player.src = url;
        playBtn.textContent = 'pause';
        player.play();
      }
      // Update System Media Metadata
      if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: file.name,
          artist: 'Music App',
          album: 'My Playlist'
        });

        // Allow system buttons to control the app
        navigator.mediaSession.setActionHandler('play', () => playBtn.click());
        navigator.mediaSession.setActionHandler('pause', () => playBtn.click());
        navigator.mediaSession.setActionHandler('seekbackward', () => player.currentTime -= 5);
        navigator.mediaSession.setActionHandler('seekforward', () => player.currentTime += 5);
      }
    });
    // window.addEventListener   
    window.addEventListener('keydown', (e) => {
      // Spacebar to Play/Pause
      if (e.code === 'Space') {
          e.preventDefault(); // Stop page from scrolling
          playBtn.click();
      }
    
      // Left Arrow to seek back 5 seconds
      if (e.code === 'ArrowLeft') {
          player.currentTime = Math.max(0, player.currentTime - 5);
      }
    
      // Right Arrow to seek forward 5 seconds
      if (e.code === 'ArrowRight') {
          player.currentTime = Math.min(player.duration, player.currentTime + 5);
      }
    });
    // function setTheme(gradient)
    const savedTheme = localStorage.getItem('savedTheme');
    if (savedTheme) {
      document.body.style.background = savedTheme;
    }
    
    function setTheme(gradient) {
      document.body.style.background = gradient;
      localStorage.setItem('savedTheme', gradient);
    }
  </script>
</body>
</html>
