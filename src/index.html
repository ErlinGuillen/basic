<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="system/style.css">
	<link rel="stylesheet" href="index.css">
	<link rel="stylesheet" href="music.css">
</head>
<body>
    <div class="start-menu" id="startMenu">
        <div class="profile-section">
            <div class="avatar"></div>
            <div class="user-info">
                <span class="username">User Name</span>
                <span class="status">Online</span>
            </div>
        </div>
        <div class="divider"></div>
        <div class="menu-items">
            <div class="item"><span class="icon">⚙️</span><span>Settings</span></div>
            <div class="item"><span class="icon">🎵</span><span>Music</span></div>
        </div>
    </div> 

	<div class="window glass" id="musicWindow" style="display: none;">
    	<div class="window-header">
        	<span>🎵 Music Player</span>
        	<button class="close-btn" id="closeMusic">×</button>
   	 	</div>
    	<div class="window-content">
        	<div class="album-art"></div>
        	<div class="song-info">
            	<p class="song-title">Forest Melodies</p>
            	<p class="artist-name">Nature Synth</p>
        	</div>
        	<div class="controls">
            	<button>⏮</button>
            	<button class="play-btn">▶</button>
            	<button>⏭</button>
        	</div>
    	</div>
	</div>
	
	<div class="taskbar">
        <div class="taskbar-item active" id="startBtn">
            <span class="icon">🏠</span>
        </div>
    </div>
    <script src="index.js"></script>
	<script src="music.js"></script>
</body>
</html>
