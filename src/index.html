<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="system/style.css">
	<link rel="stylesheet" href="index.css">
	<link rel="stylesheet" href="music.css">
	<link rel="stylesheet" href="setting.css">
</head>
<body>
    <div class="start-menu" id="startMenu">
        <div class="profile-section">
            <div class="avatar"></div>
            <div class="user-info">
                <span class="username">User Name</span>
                <span class="status">Online</span>
            </div>
        </div>
        <div class="divider"></div>
        <div class="menu-items">
            <div class="item"><span class="icon">⚙️</span><span>Settings</span></div>
            <div class="item"><span class="icon">🎵</span><span>Music</span></div>
        </div>
    </div> 

	<div class="window glass" id="musicWindow" style="display: none;">
    	<div class="window-header">
        	<span>🎵 Music Player</span>
        	<button class="close-btn" id="closeMusic">×</button>
   	 	</div>
    	<div class="window-content">
        	<div class="album-art"></div>
        	<div class="song-info">
            	<p class="song-title">Forest Melodies</p>
            	<p class="artist-name">Nature Synth</p>
        	</div>
        	<div class="controls">
            	<button>⏮</button>
            	<button class="play-btn" id="mainPlayBtn">▶</button>
            	<button>⏭</button>
        	</div>
			<div class="progress-container">
                <div class="progress-bar" id="progress"></div>
            </div>
			    <audio id="audioPlayer">
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
               </audio>
        </div>
	</div>

	<div class="window glass" id="settingsWindow" style="display: none;">
    	<div class="window-header">
        	<span>⚙️ Settings</span>
        	<button class="close-btn" id="closeSettings">×</button>
    	</div>
    	<div class="window-content">
       	   <h3>Wallpaper</h3>
        		<div class="wallpaper-grid">
            	<div class="wall-opt" onclick="changeWall('forest')">🌲</div>
            	<div class="wall-opt" onclick="changeWall('ocean')">🌊</div>
            	<div class="wall-opt" onclick="changeWall('night')">🌙</div>
        	</div>
    	</div>
    </div>
	
	<div class="taskbar">
        <div class="taskbar-item active" id="startBtn">
            <span class="icon">🏠</span>
			<div id="clock" class="taskbar-time">00:00 PM</div>
        </div>
    </div>
    <script src="index.js"></script>
	<script src="music.js"></script>
	<script src="setting.js"></script>
</body>
</html>
